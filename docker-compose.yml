services:
  postgres:
    image: postgres:16-alpine
    container_name: gig-marketplace-db
    restart: unless-stopped
    ports:
      - '${DB_PORT:-5432}:5432'
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-gig_marketplace}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-gig_marketplace}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - gig-marketplace-network

volumes:
  postgres_data:
    driver: local

networks:
  gig-marketplace-network:
    driver: bridge
