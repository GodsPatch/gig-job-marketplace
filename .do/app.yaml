name: gig-marketplace-api
services:
  - name: api
    source:
      github:
        repo: org/gig-marketplace          # ← Thay bằng repo thật
        branch: main
        deploy_on_push: false              # Manual trigger only
    build_command: npm ci && cd apps/api && npm run build
    run_command: cd apps/api && npm run start
    environment_slug: node-js
    instance_count: 1
    instance_size_slug: professional-xs    # 1 vCPU, 1GB RAM
    http_port: 4000
    health_check:
      http_path: /api/v1/health
      timeout_seconds: 10
      period_seconds: 30
    envs:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: DATABASE_URL
        value: ${db.DATABASE_URL}
        type: SECRET
      - key: DB_HOST
        value: ${db.HOSTNAME}
      - key: DB_PORT
        value: ${db.PORT}
      - key: DB_NAME
        value: ${db.DATABASE}
      - key: DB_USER
        value: ${db.USERNAME}
      - key: DB_PASSWORD
        value: ${db.PASSWORD}
        type: SECRET
      - key: JWT_SECRET
        type: SECRET
      - key: REFRESH_TOKEN_SECRET
        type: SECRET
      - key: SENTRY_DSN
        type: SECRET
      - key: CORS_ORIGIN
        value: https://gigmarketplace.vn   # ← Thay bằng domain thật
      - key: FRONTEND_URL
        value: https://gigmarketplace.vn
      - key: LOG_LEVEL
        value: info

databases:
  - name: db
    engine: PG
    version: "16"
    size: db-s-1vcpu-1gb
    num_nodes: 1
